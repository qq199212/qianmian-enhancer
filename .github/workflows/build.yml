name: Build Qianmian Enhancer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Tweak
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid xz gnu-tar
          echo "Installed dependencies"

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Download iOS SDK
        run: |
          # 下载 iOS 15.5 SDK
          curl -L -o iphoneos.sdk.tar.xz "https://github.com/xybp888/iOS-SDKs/releases/download/iOS-SDKs/iPhoneOS15.5.sdk.tar.xz"
          mkdir -p $THEOS/sdks
          tar -xf iphoneos.sdk.tar.xz -C $THEOS/sdks/
          ls -la $THEOS/sdks/

      - name: Build Package
        run: |
          export THEOS=$HOME/theos
          make package FINALPACKAGE=1
          ls -la packages/

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QianmianEnhancer-deb
          path: packages/*.deb
